<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Iniciar Sesión</h3>
          
          @if (errorMessage()) {
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{ errorMessage() }}
            </div>
          }
          
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" formControlName="email" placeholder="ejemplo@correo.com" [disabled]="isLoading()">
            </div>
            
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" formControlName="password" placeholder="******" [disabled]="isLoading()">
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid || isLoading()">
              @if (isLoading()) {
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Cargando...
              } @else {
                Ingresar
              }
            </button>
          </form>

          <div class="text-center mt-3">
            <small>¿No tienes cuenta? <a routerLink="/register" [class.disabled]="isLoading()">Regístrate aquí</a></small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
